<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>私房菜谱 - 美味检索</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap&subset=chinese-simplified" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" defer></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-decor"></div>

<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="favicon.svg" class="icon-box" alt="Logo">
        <h1>私房<span>菜谱</span></h1>
      </img>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="search-wrapper">
        <div class="search-box">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="searchInput" placeholder="搜索菜名、食材、口味..." autocomplete="off">
          <button class="search-clear" id="searchClear" aria-label="清除">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <button class="wheel-entry-btn" id="wheelEntryBtn" title="今日菜谱轮盘抽奖">
        <span class="btn-icon">🎰</span> 今日菜谱
      </button>
    </div>

    <div class="filter-row">
      <div class="stat-badge">共 <strong id="totalCount">0</strong> 道</div>
      <div class="stat-badge">找到 <strong id="filteredCount">0</strong> 道</div>
      <div class="filter-tags" id="filterTags"></div>
    </div>

    <div class="results-area" id="resultsArea">
      <div class="skeleton-loader" id="skeletonLoader">
        <div class="skeleton-header">
          <div class="skeleton-title-line"></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Wheel Modal -->
<div class="wheel-overlay" id="wheelOverlay">
  <div class="wheel-panel">
    <button class="wheel-close" id="wheelClose">✕</button>
    <div class="wheel-inner">
      <div class="wheel-title">🎰 今日菜谱 · 轮盘抽奖</div>
      <div class="wheel-subtitle">让命运决定今天吃什么</div>

      <!-- Mode Tabs -->
      <div class="wheel-mode-tabs" id="wheelModeTabs">
        <button class="wheel-mode-tab active" data-mode="tag">🏷️ 标签抽奖</button>
        <button class="wheel-mode-tab" data-mode="custom">✏️ 自定义抽奖</button>
      </div>

      <!-- Tag Selector -->
      <div class="wheel-tag-area" id="wheelTagArea"></div>

      <!-- Custom Input -->
      <div class="wheel-custom-area" id="wheelCustomArea">
        <textarea class="wheel-custom-input" id="wheelCustomInput"
          placeholder="输入自定义选项，每行一个&#10;例如：&#10;红烧排骨&#10;清蒸鲈鱼&#10;番茄炒蛋&#10;..."></textarea>
        <div class="wheel-custom-hint">每行一个选项，需要 2-20 个选项</div>
        <button class="wheel-custom-btn" id="wheelCustomGenBtn">🎯 生成转盘</button>
      </div>

      <!-- Canvas Area -->
      <div class="wheel-canvas-area" id="wheelCanvasArea">
        <div class="wheel-empty" id="wheelEmpty">
          <div class="empty-icon">👆</div>
          <p>请先选择一个标签来生成转盘</p>
        </div>
      </div>

      <!-- Spin Button -->
      <button class="wheel-spin-btn" id="wheelSpinBtn" disabled>🎲 开始抽奖</button>

      <!-- Result -->
      <div class="wheel-result" id="wheelResult">
        <div class="result-label">🎉 恭喜！今天吃</div>
        <div class="result-name" id="wheelResultName"></div>
        <div class="result-actions">
          <button class="result-btn primary" id="wheelResultView">📖 查看菜谱</button>
          <button class="result-btn" id="wheelResultRetry">🔄 再来一次</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="app.js" defer></script>
</body>
</html>
