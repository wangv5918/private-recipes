<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e07b39">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<title>私房菜谱 - 美味检索</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap&subset=chinese-simplified" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" defer></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.19.6/dist/index.js" defer></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-decor"></div>

<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="favicon.svg" class="icon-box" alt="Logo">
        <h1>私房<span>菜谱</span></h1>
      </img>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="search-wrapper">
        <div class="search-box">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="searchInput" placeholder="搜索菜名、食材、口味...（支持拼音）" autocomplete="off">
          <button class="search-clear" id="searchClear" aria-label="清除">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="search-suggestions" id="searchSuggestions" style="display:none"></div>
      </div>
      <button class="wheel-entry-btn" id="wheelEntryBtn" title="今日菜谱轮盘抽奖">
        <span class="btn-icon">🎰</span> 今日菜谱
      </button>
      <button class="theme-toggle" id="themeToggle" title="切换深色/浅色模式" aria-label="切换主题">🌓</button>
      <button class="add-recipe-btn" id="addRecipeBtn" title="新增菜谱">＋ 新增</button>
    </div>

    <div class="filter-row">
      <div class="stat-badge">共 <strong id="totalCount">0</strong> 道</div>
      <div class="stat-badge">找到 <strong id="filteredCount">0</strong> 道</div>
      <div class="filter-tags" id="filterTags"></div>
      <div class="fav-badge" id="favFilterBadge" style="display:none" title="只看收藏">❤️ 收藏 <strong id="favFilterCount">0</strong></div>
      <div class="shopping-badge" id="shoppingBadge" title="购物清单">🛒 清单 <strong id="shoppingCount">0</strong></div>
    </div>

    <div class="results-area" id="resultsArea">
      <div class="skeleton-loader" id="skeletonLoader">
        <div class="skeleton-header">
          <div class="skeleton-title-line"></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton-card-title"></div>
            <div class="skeleton-card-meta">
              <div class="skeleton-meta-dot"></div>
              <div class="skeleton-meta-line"></div>
              <div class="skeleton-meta-line"></div>
            </div>
            <div class="skeleton-card-tags">
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
              <div class="skeleton-tag"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Wheel Modal -->
<div class="wheel-overlay" id="wheelOverlay">
  <div class="wheel-panel">
    <button class="wheel-close" id="wheelClose">✕</button>
    <div class="wheel-inner">
      <div class="wheel-title">🎰 今日菜谱 · 轮盘抽奖</div>
      <div class="wheel-subtitle">让命运决定今天吃什么</div>

      <!-- Mode Tabs -->
      <div class="wheel-mode-tabs" id="wheelModeTabs">
        <button class="wheel-mode-tab active" data-mode="tag">🏷️ 标签抽奖</button>
        <button class="wheel-mode-tab" data-mode="custom">✏️ 自定义抽奖</button>
      </div>

      <!-- Tag Selector -->
      <div class="wheel-tag-area" id="wheelTagArea"></div>

      <!-- Custom Input -->
      <div class="wheel-custom-area" id="wheelCustomArea">
        <textarea class="wheel-custom-input" id="wheelCustomInput"
          placeholder="输入自定义选项，每行一个&#10;例如：&#10;红烧排骨&#10;清蒸鲈鱼&#10;番茄炒蛋&#10;..."></textarea>
        <div class="wheel-custom-hint">每行一个选项，需要 2-20 个选项</div>
        <button class="wheel-custom-btn" id="wheelCustomGenBtn">🎯 生成转盘</button>
      </div>

      <!-- Canvas Area -->
      <div class="wheel-canvas-area" id="wheelCanvasArea">
        <div class="wheel-empty" id="wheelEmpty">
          <div class="empty-icon">👆</div>
          <p>请先选择一个标签来生成转盘</p>
        </div>
      </div>

      <!-- Spin Button -->
      <button class="wheel-spin-btn" id="wheelSpinBtn" disabled>🎲 开始抽奖</button>

      <!-- Result -->
      <div class="wheel-result" id="wheelResult">
        <div class="result-label">🎉 恭喜！今天吃</div>
        <div class="result-name" id="wheelResultName"></div>
        <div class="result-actions">
          <button class="result-btn primary" id="wheelResultView">📖 查看菜谱</button>
          <button class="result-btn" id="wheelResultRetry">🔄 再来一次</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- Shopping Backdrop -->
<div class="shopping-backdrop" id="shoppingBackdrop"></div>

<!-- Shopping Panel -->
<div class="shopping-panel" id="shoppingPanel">
  <div class="shopping-panel-header">
    <h3>🛒 购物清单</h3>
    <button class="shopping-panel-close" id="shoppingPanelClose">✕</button>
  </div>
  <div class="shopping-panel-body" id="shoppingPanelBody">
    <div class="shopping-empty">
      <div class="empty-icon">🛒</div>
      <p>清单还是空的<br>在菜谱详情中点击「加入清单」</p>
    </div>
  </div>
  <div class="shopping-panel-footer">
    <button class="shopping-clear-btn" id="shoppingClearAll">清空全部</button>
    <button class="shopping-copy-btn" id="shoppingCopy">📋 复制清单</button>
  </div>
</div>

<!-- Timer Widget -->
<div class="timer-widget collapsed" id="timerWidget">
  <div class="timer-widget-header" id="timerWidgetHeader">
    <h4>⏱ 计时器</h4>
    <span class="timer-count" id="timerCount">0</span>
  </div>
  <div class="timer-widget-body" id="timerWidgetBody">
    <button class="timer-add-btn" id="timerAddBtn">+ 添加计时</button>
  </div>
</div>

<!-- Timer Add Modal -->
<div class="timer-modal-overlay" id="timerModal" style="display:none">
  <div class="timer-modal">
    <h4>添加计时器</h4>
    <input type="text" id="timerModalName" placeholder="计时名称（如：焖鸡腿）" maxlength="20">
    <input type="number" id="timerModalMinutes" placeholder="分钟数" min="1" max="180" value="5">
    <div class="timer-modal-actions">
      <button class="btn-cancel" id="timerModalCancel">取消</button>
      <button class="btn-confirm" id="timerModalConfirm">开始计时</button>
    </div>
  </div>
</div>

<!-- Recipe Form Modal (新增/编辑) -->
<div class="modal-overlay" id="recipeFormOverlay">
  <div class="modal-content recipe-form-modal" id="recipeFormContent">
    <button class="modal-close" id="recipeFormClose">✕</button>
    <div class="modal-inner">
      <h2 class="modal-title" id="recipeFormTitle">新增菜谱</h2>
      <form id="recipeForm" autocomplete="off">
        <div class="form-row">
          <label>菜名 <span class="required">*</span></label>
          <input type="text" name="title" required placeholder="如：红烧排骨">
        </div>
        <div class="form-row form-row-3">
          <label>分类 <span class="required">*</span>
            <select name="category" required>
              <option value="肉类">肉类</option><option value="米饭">米饭</option><option value="面食">面食</option><option value="火锅">火锅</option><option value="汤羹">汤羹</option><option value="家常菜">家常菜</option><option value="小吃">小吃</option><option value="烘焙">烘焙</option><option value="饮品">饮品</option><option value="甜品">甜品</option>
            </select>
          </label>
          <label>子分类
            <select name="subcategory">
              <option value="">自动</option><option value="猪肉">猪肉</option><option value="鸡肉">鸡肉</option><option value="牛肉">牛肉</option><option value="羊肉">羊肉</option><option value="海鲜">海鲜</option><option value="米饭">米饭</option><option value="面食">面食</option><option value="火锅">火锅</option><option value="汤羹">汤羹</option><option value="素菜">素菜</option><option value="蛋类">蛋类</option><option value="豆腐">豆腐</option><option value="小吃">小吃</option><option value="蛋糕">蛋糕</option><option value="饼干">饼干</option><option value="面包">面包</option><option value="酥点">酥点</option><option value="茶饮">茶饮</option><option value="咖啡">咖啡</option><option value="奶茶">奶茶</option><option value="奶昔">奶昔</option><option value="鸡尾酒">鸡尾酒</option><option value="气泡水">气泡水</option><option value="热饮">热饮</option><option value="奶冻">奶冻</option><option value="冰品">冰品</option><option value="糖水">糖水</option><option value="其他">其他</option>
            </select>
          </label>
          <label>难度
            <select name="difficulty">
              <option value="中等">中等</option><option value="简单">简单</option><option value="困难">困难</option>
            </select>
          </label>
        </div>
        <div class="form-row form-row-3">
          <label>烹饪时间(分钟)
            <input type="number" name="cookingTime" value="30" min="1" max="300">
          </label>
          <label>份量
            <input type="text" name="servings" value="2-3人份">
          </label>
          <label>标签（逗号分隔）
            <input type="text" name="tags" placeholder="如：快手,下饭,红烧">
          </label>
        </div>
        <div class="form-row">
          <label>食材清单 <span class="required">*</span> <small>（每行: 名称 用量 备注）</small></label>
          <textarea name="ingredients" rows="5" required placeholder="去骨鸡腿 2只 带皮更香&#10;鸡蛋 3个 打散&#10;生抽 2勺"></textarea>
        </div>
        <div class="form-row">
          <label>步骤 <span class="required">*</span> <small>（用 ## 阶段名 分隔阶段）</small></label>
          <textarea name="steps" rows="8" required placeholder="## 准备&#10;1. 鸡腿去骨切块。&#10;2. 加生抽料酒腌制。&#10;&#10;## 炒制&#10;3. 热锅冷油煎鸡腿。&#10;4. 加入酱汁焖煮。"></textarea>
        </div>
        <div class="form-row">
          <label>烹饪技巧 <small>（每行一条）</small></label>
          <textarea name="tips" rows="3" placeholder="腌时加淀粉锁水&#10;小火慢煎更香"></textarea>
        </div>
        <div class="form-row">
          <label>营养分析 <small>（每行一条）</small></label>
          <textarea name="nutrition" rows="3" placeholder="蛋白≈60g&#10;热量≈400大卡/人份"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="recipeFormCancel">取消</button>
          <button type="submit" class="btn-submit" id="recipeFormSubmit">保存菜谱</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="supabase.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
